name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs opt into more only if needed.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Build-tool versions (keep in sync with the Dockerfile ARGs).
env:
  TEMPL_VERSION: v0.3.1020
  SQLC_VERSION: v1.31.1
  GOOSE_VERSION: v3.27.1
  TAILWIND_VERSION: v4.3.1

jobs:
  # Regenerate templ/sqlc/Tailwind and fail if the committed artifacts drift,
  # then gofmt + vet. CI has network; the OFFLINE constraint only applies to the
  # Docker image build.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install codegen tools
        run: |
          go install github.com/a-h/templ/cmd/templ@${TEMPL_VERSION}
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@${SQLC_VERSION}
          curl -fsSL -o "$RUNNER_TEMP/tailwindcss" \
            "https://github.com/tailwindlabs/tailwindcss/releases/download/${TAILWIND_VERSION}/tailwindcss-linux-x64"
          chmod +x "$RUNNER_TEMP/tailwindcss"
      - name: Regenerate artifacts
        run: |
          sqlc generate
          templ generate
          "$RUNNER_TEMP/tailwindcss" -i static/css/input.css -o static/css/app.css --minify
      - name: Fail if generated artifacts are stale
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo '::error::Generated artifacts are out of date. Run `make generate` and commit.'
            git --no-pager diff
            exit 1
          fi
      - name: gofmt
        run: |
          unformatted=$(gofmt -l . | grep -v '_templ.go' || true)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needed on:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...

  # Store tests run against a real PostgreSQL service container (no DB mocking).
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgres://app:app@localhost:5432/app?sslmode=disable
      TEST_DATABASE_URL: postgres://app:app@localhost:5432/app?sslmode=disable
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Apply migrations
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@${GOOSE_VERSION}
          goose -dir migrations postgres "$DATABASE_URL" up
      - name: Test (race detector)
        run: go test ./... -race

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Verify vendored frontend asset checksums
        run: cd static/js && shasum -a 256 -c vendor/CHECKSUMS.txt

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      - name: Build production image
        run: docker build -t app:ci .
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: app:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Generate SBOM (Syft, CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom.cdx.json
