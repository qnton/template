name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs opt into more only if needed.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Build-tool versions (keep in sync with the Dockerfile ARGs).
env:
  TEMPL_VERSION: v0.3.1020
  SQLC_VERSION: v1.31.1
  GOOSE_VERSION: v3.27.1
  TAILWIND_VERSION: v4.3.1
  GOLANGCI_VERSION: v2.12.2

jobs:
  # Regenerate templ/sqlc/Tailwind and fail if the committed artifacts drift,
  # then gofmt + vet. CI has network; the OFFLINE constraint only applies to the
  # Docker image build.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install codegen tools
        run: |
          go install github.com/a-h/templ/cmd/templ@${TEMPL_VERSION}
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@${SQLC_VERSION}
          curl -fsSL -o "$RUNNER_TEMP/tailwindcss" \
            "https://github.com/tailwindlabs/tailwindcss/releases/download/${TAILWIND_VERSION}/tailwindcss-linux-x64"
          chmod +x "$RUNNER_TEMP/tailwindcss"
      - name: Regenerate artifacts
        run: |
          sqlc generate
          templ generate
          "$RUNNER_TEMP/tailwindcss" -i static/css/input.css -o static/css/app.css --minify
      - name: Fail if generated artifacts are stale
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo '::error::Generated artifacts are out of date. Run `make generate` and commit.'
            git --no-pager diff
            exit 1
          fi
      - name: gofmt
        run: |
          unformatted=$(gofmt -l . | grep -v '_templ.go' || true)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needed on:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...

  # golangci-lint with a security-leaning set (incl. gosec). Complements `verify`
  # (gofmt + vet); config lives in .golangci.yml.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false # golangci-lint-action manages its own cache
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: ${{ env.GOLANGCI_VERSION }}

  # CodeQL static analysis for Go (AST-level taint/security queries).
  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # publish results to the Security tab
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: go
      - uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

  # Store tests run against a real PostgreSQL service container (no DB mocking).
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgres://app:app@localhost:5432/app?sslmode=disable
      TEST_DATABASE_URL: postgres://app:app@localhost:5432/app?sslmode=disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Apply migrations
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@${GOOSE_VERSION}
          goose -dir migrations postgres "$DATABASE_URL" up
      - name: Test (race detector)
        run: go test ./... -race

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify vendored asset checksums (and that none are unlisted)
        run: make verify-assets

  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to the Security tab
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Full-severity scan emitted as SARIF for the Security tab (does not gate).
      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          ignore-unfixed: true
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-fs.sarif
      # Gate: fail the build on CRITICAL/HIGH (filesystem deps, then the image).
      - name: Trivy filesystem scan (gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      - name: Build production image
        run: docker build -t app:ci .
      - name: Trivy image scan (gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: app:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Generate SBOM (Syft, CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom.cdx.json
