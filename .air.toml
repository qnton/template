# air config for `make dev` live reload (optional local dev tool — NOT a project
# dependency; install with: go install github.com/air-verse/air@latest).
# templ/tailwind run their own watchers; air rebuilds & restarts the Go server.
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./cmd/server"
  bin = "./tmp/server"
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor", "static", "migrations", ".git", ".github"]
  exclude_regex = ["_test\\.go"]
  stop_on_error = true
  delay = 300

[misc]
  clean_on_exit = true
